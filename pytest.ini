[pytest]
# ============================
# pytest 配置文件
# ============================

# 测试路径
testpaths = test_cases

# Python 文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 命令行默认参数
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 注册自定义 markers
markers =
    api: API 接口测试
    smoke: 冒烟测试
    regression: 回归测试
    p0: 优先级 P0（最高）
    p1: 优先级 P1
    p2: 优先级 P2
    slow: 慢速测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d | %(message)s
log_cli_date_format = %H:%M:%S

# 超时（秒）
timeout = 300