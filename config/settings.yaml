# ============================
# 全局默认配置
# ============================

project:
  name: "接口自动化测试框架"
  version: "1.0.0"

# 当前激活环境 (dev / test / prod)
active_env: dev

# 默认超时配置
timeout:
  http_request: 30       # HTTP 请求超时（秒）

# Excel 用例路径
case_paths:
  api: "data/api/"
  common: "data/common/"

# 日志配置
logging:
  level: "INFO"          # DEBUG / INFO / WARNING / ERROR
  rotation: "1 day"
  retention: "15 days"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name}:{function}:{line} | {message}"

# 报告配置
allure:
  result_dir: "reports/allure-results"
  clean_results: true

# 重试配置
retry:
  max_attempts: 2
  delay: 1000            # 毫秒