# Playwright 浏览器配置
browser:
  type: "chromium"       # chromium / firefox / webkit
  headless: false
  slow_mo: 100           # 操作减速（毫秒），便于调试
  viewport:
    width: 1920
    height: 1080
  locale: "zh-CN"
  ignore_https_errors: true

  # 录制选项（调试用）
  record_video: false
  record_har: false

  # 浏览器上下文（可指定登录态文件路径）
  storage_state: null